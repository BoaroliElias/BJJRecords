services:
  postgres:
    image: postgres:16-alpine
    container_name: bjjrecords-postgres
    environment:
      POSTGRES_USER: bjjrecords
      POSTGRES_PASSWORD: bjjrecords_dev
      POSTGRES_DB: bjjrecords
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bjjrecords -d bjjrecords"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
